<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - GoReserve</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0a0a0f;
      --surface: #f5f4f0;
      --accent: #c8f53c;
      --accent-dim: #b0d832;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      background: var(--surface);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px 64px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      top: -140px; left: -140px;
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(200,245,60,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      bottom: -80px; right: -60px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(200,245,60,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── BRAND ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 52px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 19px;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.4px;
    }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Space Mono', monospace;
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 700;
      color: #fff;
      line-height: 1.15;
      margin: 0 0 10px;
    }

    .headline span { color: var(--accent); }

    .subline {
      font-size: 14.5px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 44px;
      font-weight: 300;
    }

    /* ── FORM ── */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .field input:focus {
      border-color: var(--accent);
      background: rgba(200,245,60,0.05);
      box-shadow: 0 0 0 3px rgba(200,245,60,0.1);
    }

    /* ── ERROR BANNER ── */
    .error-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3);
      color: #ff8a8a;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 24px;
      animation: slideIn 0.35s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SUBMIT ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--ink);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 55%);
      pointer-events: none;
    }

    .btn-login:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(200,245,60,0.28);
    }

    .btn-login:active { transform: translateY(0); }

    /* ── REGISTER LINK ── */
    .register-link {
      text-align: center;
      margin-top: 26px;
      font-size: 13px;
      color: rgba(255,255,255,0.38);
    }

    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
    }

    .register-link a:hover { text-decoration: underline; }

    /* ── DIVIDER ── */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 0;
    }

    .or-divider span {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      white-space: nowrap;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      position: relative;
      overflow: hidden;
      background: #e8e7e2;
    }

    .right-panel img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .right-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(10,10,15,0.18) 0%, transparent 55%);
      pointer-events: none;
    }

    /* Floating trust badge */
    .img-badge {
      position: absolute;
      bottom: 36px; left: 36px;
      background: var(--ink);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.08);
      animation: floatUp 0.6s 0.25s ease both;
    }

    .img-badge strong {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      color: var(--accent);
      line-height: 1.2;
    }

    @keyframes floatUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── REVEAL ANIMATIONS ── */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      animation: reveal 0.5s ease forwards;
    }

    @keyframes reveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .reveal:nth-child(1) { animation-delay: 0.05s; }
    .reveal:nth-child(2) { animation-delay: 0.12s; }
    .reveal:nth-child(3) { animation-delay: 0.19s; }
    .reveal:nth-child(4) { animation-delay: 0.26s; }
    .reveal:nth-child(5) { animation-delay: 0.33s; }
    .reveal:nth-child(6) { animation-delay: 0.40s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .page-wrapper { grid-template-columns: 1fr; }
      .right-panel { display: none; }
      .left-panel { padding: 48px 28px; }
    }
  </style>
</head>

<body>

  <!-- Minimal Navbar -->
  <div th:replace="fragments/navbar-minimal :: minimal-navbar"></div>

  <div class="page-wrapper">

    <!-- ── LEFT: FORM PANEL ── -->
    <div class="left-panel">

      <!-- Brand -->
      <div class="brand reveal">
        <div class="brand-icon">🚌</div>
        <span class="brand-name">GoReserve</span>
      </div>

      <!-- Headline -->
      <div class="reveal">
        <h1 class="headline">Welcome<br><span>back.</span></h1>
        <p class="subline">Sign in to manage your bookings and travel history.</p>
      </div>

      <!-- Error Banner -->
      <div th:if="${param.error}" class="error-banner reveal">
        <span>✕</span>
        <span>Invalid email or password. Please try again.</span>
      </div>

      <!-- Form -->
      <form method="post" th:action="@{/login}">

        <div class="field reveal">
          <label for="username">Email Address</label>
          <input type="text" id="username" name="username"
                 placeholder="you@example.com"
                 th:value="${param.username}"
                 required />
        </div>

        <div class="field reveal">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Your password"
                 required />
        </div>

        <div class="reveal">
          <button type="submit" class="btn-login">
            Sign In →
          </button>
        </div>

      </form>

      <div class="or-divider reveal">
        <span>New to GoReserve?</span>
      </div>

      <p class="register-link reveal">
        Don't have an account?
        <a th:href="@{/register}">Create one free</a>
      </p>

    </div>

    <!-- ── RIGHT: IMAGE PANEL ── -->
    <div class="right-panel">
      <img src="/images/loginGif.gif" alt="Bus Animation" />
      <div class="img-badge">
        <strong>98%</strong>
        on-time reservation rate
      </div>
    </div>

  </div>

</body>
</html>
