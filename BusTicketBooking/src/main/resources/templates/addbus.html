<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8" /></head>
<body>

<div th:fragment="content">
  <style>
    .addbus-wrapper {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── PAGE HEADER ── */
    .addbus-header {
      margin-bottom: 32px;
    }
    .addbus-header h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .addbus-header p {
      font-size: 14px;
      color: var(--mid);
    }

    /* ── SUCCESS BANNER ── */
    .success-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.3);
      color: #15803d;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 28px;
      animation: slideIn 0.35s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FORM CARD ── */
    .form-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(10,10,15,0.05);
    }

    /* ── SECTION DIVIDER ── */
    .form-section {
      margin-bottom: 32px;
    }
    .form-section-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── FORM GRID ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-grid.cols-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    /* ── FIELD ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--mid);
    }
    .field input {
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      outline: none;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }
    .field input::placeholder { color: rgba(10,10,15,0.25); }
    .field input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(200,245,60,0.15);
    }

    /* ── SUBMIT ── */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .btn-submit {
      background: var(--accent);
      color: var(--ink);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 13px 32px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .btn-submit::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 55%);
      pointer-events: none;
    }
    .btn-submit:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(200,245,60,0.3);
    }
    .btn-reset {
      background: transparent;
      color: var(--mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 20px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }
    .btn-reset:hover {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--surface);
    }

    /* ── DARK MODE ── */
    .dark .addbus-header h1 { color: #fff; }
    .dark .form-card        { background: #16161e; border-color: rgba(255,255,255,0.07); }
    .dark .form-section-title { color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.07); }
    .dark .field label      { color: rgba(255,255,255,0.4); }
    .dark .field input      { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #fff; }
    .dark .field input::placeholder { color: rgba(255,255,255,0.2); }
    .dark .field input:focus { background: rgba(200,245,60,0.04); border-color: var(--accent); }
    .dark .form-actions     { border-color: rgba(255,255,255,0.07); }
    .dark .btn-reset        { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.4); }
    .dark .btn-reset:hover  { border-color: rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.05); }
    .dark .success-banner   { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.25); color: #4ade80; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .form-card { padding: 24px 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid.cols-3 { grid-template-columns: 1fr 1fr; }
      .form-actions { flex-direction: column; }
      .btn-submit, .btn-reset { width: 100%; justify-content: center; }
    }
    @media (max-width: 480px) {
      .form-grid.cols-3 { grid-template-columns: 1fr; }
    }
  </style>

  <div class="addbus-wrapper">

    <!-- Header -->
    <div class="addbus-header">
      <h1>Add New Bus</h1>
      <p>Fill in the details below to add a new bus to the GoReserve network.</p>
    </div>

    <!-- Success Banner -->
    <div th:if="${success}" class="success-banner">
      <span>✓</span>
      <span>Bus successfully added to GoReserve!</span>
    </div>

    <!-- Form Card -->
    <div class="form-card">
      <form th:action="@{/addBus}" method="post">

        <!-- Bus Info -->
        <div class="form-section">
          <div class="form-section-title">🚌 Bus Information</div>
          <div class="form-grid">
            <div class="field">
              <label for="busName">Bus Name</label>
              <input type="text" id="busName" name="busName" placeholder="e.g. Volvo AC Sleeper" required />
            </div>
            <div class="field">
              <label for="busType">Bus Type</label>
              <input type="text" id="busType" name="busType" placeholder="e.g. AC Sleeper / Seater" required />
            </div>
            <div class="field">
              <label for="driverName">Driver Name</label>
              <input type="text" id="driverName" name="driverName" placeholder="e.g. Ravi Kumar" required />
            </div>
            <div class="field">
              <label for="seats">Total Seats</label>
              <input type="number" id="seats" name="seats" placeholder="e.g. 40" required />
            </div>
          </div>
        </div>

        <!-- Route Info -->
        <div class="form-section">
          <div class="form-section-title">🗺️ Route Details</div>
          <div class="form-grid">
            <div class="field">
              <label for="routeFrom">From</label>
              <input type="text" id="routeFrom" name="routeFrom" placeholder="e.g. Delhi" required />
            </div>
            <div class="field">
              <label for="routeTo">To</label>
              <input type="text" id="routeTo" name="routeTo" placeholder="e.g. Mumbai" required />
            </div>
            <div class="field">
              <label for="distance">Distance (km)</label>
              <input type="number" id="distance" name="distance" placeholder="e.g. 1200" required />
            </div>
            <div class="field">
              <label for="fare">Fare (₹)</label>
              <input type="number" id="fare" name="fare" placeholder="e.g. 1500" required />
            </div>
          </div>
        </div>

        <!-- Schedule -->
        <div class="form-section">
          <div class="form-section-title">🕐 Schedule</div>
          <div class="form-grid cols-3">
            <div class="field">
              <label for="busJourneyDate">Journey Date</label>
              <input type="date" id="busJourneyDate" name="busJourneyDate" required />
            </div>
            <div class="field">
              <label for="departureTime">Departure Time</label>
              <input type="time" id="departureTime" name="departureTime" required />
            </div>
            <div class="field">
              <label for="arrivalTime">Arrival Time</label>
              <input type="time" id="arrivalTime" name="arrivalTime" required />
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="reset" class="btn-reset">Clear form</button>
          <button type="submit" class="btn-submit">➕ Add Bus</button>
        </div>

      </form>
    </div>
  </div>

</div>
</body>
</html>
