<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle} ?: 'GoReserve'">All Users</title>

  <!-- ✅ Dark Mode Setup -->
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>

  <!-- ✅ Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>

  <!-- ✅ Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- ✅ AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
</head>

<body class="bg-gradient-to-r from-indigo-100 to-blue-100 dark:from-gray-900 dark:to-gray-800 text-gray-900 dark:text-gray-100 min-h-screen">

  <!-- ✅ Admin Navbar -->
  <div th:replace="fragments/adminnavbar :: adminnavbar"></div>

  <div class="max-w-6xl mx-auto py-10 px-6">
    <h2 class="text-3xl font-semibold text-center text-blue-700 dark:text-blue-300 mb-10">📋 All Registered Users</h2>

    <!-- ✅ User Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div th:each="user : ${user}" class="bg-white dark:bg-gray-900 shadow-lg rounded-lg p-6" data-aos="fade-up">
        <h3 class="text-xl font-bold text-blue-600 dark:text-blue-300 mb-4">👤 [[${user.firstName}]] [[${user.lastName}]]</h3>
        <p><strong class="text-gray-700 dark:text-gray-300">ID:</strong> [[${user.id}]]</p>
        <p><strong class="text-gray-700 dark:text-gray-300">Email:</strong> [[${user.email}]]</p>
      </div>
    </div>

    <div class="text-center mt-12">
      <a href="/adminBusList"
         class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition duration-300">
        🔙 Back to Dashboard
      </a>
    </div>
  </div>

  <!-- ✅ Dark Mode Toggle, AOS Init -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      AOS.init({ once: true, duration: 1000 });

      const toggles = [document.getElementById('darkModeToggle'), document.getElementById('darkModeToggleMobile')];
      toggles.forEach(toggle => {
        if (toggle) {
          toggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            toggle.innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
          });
          toggle.innerText = document.documentElement.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
        }
      });
    });
  </script>

</body>
</html>
