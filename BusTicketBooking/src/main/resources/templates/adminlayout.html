<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:class="${adminDark} ? 'dark' : ''">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle} ?: 'Admin — GoReserve'">Admin</title>

  <!-- Dark mode init -->
  <script>
    if (localStorage.getItem('adminTheme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════
       GORESERVE ADMIN — Design System
       Aesthetic: Command-center dark UI
       Accent: lime #c8f53c on deep charcoal
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0a0a0f;
      --ink-2:      #12121a;
      --ink-3:      #1a1a26;
      --surface:    #f5f4f0;
      --surface-2:  #eeedea;
      --border:     rgba(10,10,15,0.1);
      --mid:        rgba(10,10,15,0.45);
      --accent:     #c8f53c;
      --accent-dim: #b0d832;
      --accent-glow:rgba(200,245,60,0.15);
      --danger:     #ef4444;
      --warning:    #f59e0b;
      --success:    #22c55e;
      --sidebar-w:  240px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: #fff;
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ══════════════════
       SIDEBAR
    ══════════════════ */
    .admin-sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--ink-2);
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    /* Logo */
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .sidebar-logo-mark {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent);
      display: grid; place-items: center;
      font-size: 18px; flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 16px; font-weight: 700; color: #fff;
      line-height: 1;
    }
    .logo-sub {
      font-size: 10px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-top: 2px;
    }

    /* Nav sections */
    .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
    .nav-section-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      padding: 12px 20px 6px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 20px;
      font-size: 13.5px; font-weight: 500;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: color 0.18s, background 0.18s, border-color 0.18s;
      cursor: pointer; background: none; border-right: none;
      border-top: none; border-bottom: none; width: 100%; text-align: left;
    }
    .nav-item:hover {
      color: #fff;
      background: rgba(255,255,255,0.04);
    }
    .nav-item.active {
      color: var(--accent);
      background: rgba(200,245,60,0.07);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .nav-item-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent); color: var(--ink);
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
      font-family: 'Space Mono', monospace;
    }
    .nav-badge.danger { background: var(--danger); color: #fff; }

    /* Sidebar bottom */
    .sidebar-bottom {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .admin-user-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; margin-bottom: 10px;
    }
    .admin-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: var(--ink);
      display: grid; place-items: center;
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .admin-name { font-size: 13px; font-weight: 600; color: #fff; }
    .admin-role { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.06em; }

    .sidebar-actions { display: flex; gap: 8px; }
    .sidebar-action-btn {
      flex: 1; padding: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px; cursor: pointer;
      font-size: 13px; color: rgba(255,255,255,0.4);
      text-align: center; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      transition: background 0.18s, color 0.18s;
    }
    .sidebar-action-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .sidebar-action-btn.danger:hover { background: rgba(239,68,68,0.12); color: var(--danger); border-color: rgba(239,68,68,0.2); }

    /* ══════════════════
       MAIN AREA
    ══════════════════ */
    .admin-main {
      flex: 1;
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      background: #0e0e16;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .admin-topbar {
      height: 56px;
      background: var(--ink-2);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center;
      padding: 0 28px;
      gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title {
      font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700; color: #fff;
      flex: 1;
    }
    .topbar-breadcrumb {
      font-size: 12px; color: rgba(255,255,255,0.3);
    }
    .topbar-breadcrumb span { color: rgba(255,255,255,0.6); }

    /* Hamburger (mobile) */
    .mobile-menu-btn {
      display: none; background: none; border: none;
      color: rgba(255,255,255,0.6); font-size: 20px; cursor: pointer;
    }

    /* Dark mode toggle in topbar */
    .topbar-dark-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      display: grid; place-items: center; cursor: pointer;
      font-size: 15px; transition: background 0.18s, color 0.18s;
    }
    .topbar-dark-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* Page content */
    .admin-content {
      flex: 1;
      padding: 28px;
    }

    /* Shimmer accent top */
    .admin-shimmer {
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

    /* ── CARD PRIMITIVE ── */
    .a-card {
      background: var(--ink-3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
    }

    /* ── SHARED FORM STYLES ── */
    .a-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      display: block; margin-bottom: 7px;
    }
    .a-input {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 14px; font-family: 'DM Sans', sans-serif; color: #fff;
      outline: none;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }
    .a-input::placeholder { color: rgba(255,255,255,0.2); }
    .a-input:focus {
      border-color: var(--accent);
      background: rgba(200,245,60,0.04);
      box-shadow: 0 0 0 3px rgba(200,245,60,0.1);
    }
    .a-select {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 14px; font-family: 'DM Sans', sans-serif; color: #fff;
      outline: none; cursor: pointer;
    }
    .a-select option { background: #1a1a26; }

    /* ── BUTTONS ── */
    .btn-primary {
      background: var(--accent); color: var(--ink);
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      transition: background 0.18s, transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
    }
    .btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,245,60,0.25); }

    .btn-ghost {
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      padding: 10px 18px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
      transition: background 0.18s, color 0.18s; text-decoration: none;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.09); color: #fff; }

    .btn-danger {
      background: rgba(239,68,68,0.1); color: var(--danger);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      padding: 8px 16px; border: 1px solid rgba(239,68,68,0.25); border-radius: 9px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.18s, border-color 0.18s; text-decoration: none;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.5); }

    .btn-edit {
      background: rgba(200,245,60,0.08); color: var(--accent);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      padding: 8px 16px; border: 1px solid rgba(200,245,60,0.2); border-radius: 9px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.18s; text-decoration: none;
    }
    .btn-edit:hover { background: rgba(200,245,60,0.14); }

    /* ── TABLE ── */
    .a-table { width: 100%; border-collapse: collapse; }
    .a-table th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase; color: rgba(255,255,255,0.3);
      padding: 0 16px 14px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .a-table td {
      padding: 14px 16px; font-size: 13.5px; color: rgba(255,255,255,0.75);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .a-table tr:last-child td { border-bottom: none; }
    .a-table tr:hover td { background: rgba(255,255,255,0.02); }
    .a-table td.mono { font-family: 'Space Mono', monospace; font-size: 12px; }
    .a-table td.bold { font-weight: 700; color: #fff; }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      letter-spacing: 0.03em;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge.paid     { background: rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25); color: #4ade80; }
    .badge.cancelled{ background: rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color: #f87171; }
    .badge.active   { background: rgba(200,245,60,0.1); border:1px solid rgba(200,245,60,0.25); color: var(--accent); }

    /* Page animations */
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-up-1 { animation: fadeUp 0.4s 0.05s ease both; }
    .fade-up-2 { animation: fadeUp 0.4s 0.10s ease both; }
    .fade-up-3 { animation: fadeUp 0.4s 0.15s ease both; }
    .fade-up-4 { animation: fadeUp 0.4s 0.20s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .admin-sidebar {
        transform: translateX(-100%);
      }
      .admin-sidebar.open {
        transform: translateX(0);
        box-shadow: 8px 0 40px rgba(0,0,0,0.5);
      }
      .admin-main { margin-left: 0; }
      .mobile-menu-btn { display: flex; }
    }
    @media (max-width: 600px) {
      .admin-content { padding: 18px; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR OVERLAY (mobile) -->
<div id="sidebarOverlay"
     onclick="closeSidebar()"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;"></div>

<!-- ══════════════════════════════
     SIDEBAR
══════════════════════════════ -->
<aside class="admin-sidebar" id="adminSidebar">

  <div class="sidebar-logo">
    <div class="sidebar-logo-mark">
      <div class="logo-icon">🚌</div>
      <div>
        <div class="logo-text">GoReserve</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Overview</div>
    <a th:href="@{/adminBusList}"
       th:classappend="${activePage == 'dashboard'} ? ' active' : ''"
       class="nav-item">
      <span class="nav-item-icon">📊</span> Dashboard
    </a>

    <div class="nav-section-label">Bus Management</div>
    <a th:href="@{/adminBuses}"
       th:classappend="${activePage == 'buses'} ? ' active' : ''"
       class="nav-item">
      <span class="nav-item-icon">🚌</span> All Buses
    </a>
    <a th:href="@{/addBus}"
       th:classappend="${activePage == 'addbus'} ? ' active' : ''"
       class="nav-item">
      <span class="nav-item-icon">➕</span> Add New Bus
    </a>

    <div class="nav-section-label">Users & Bookings</div>
    <a th:href="@{/showUsers}"
       th:classappend="${activePage == 'users'} ? ' active' : ''"
       class="nav-item">
      <span class="nav-item-icon">👥</span> All Users
    </a>
    <a th:href="@{/adminBookings}"
       th:classappend="${activePage == 'bookings'} ? ' active' : ''"
       class="nav-item">
      <span class="nav-item-icon">🎫</span> All Bookings
    </a>

    <div class="nav-section-label">Site</div>
    <a th:href="@{/index}" class="nav-item">
      <span class="nav-item-icon">🌐</span> View Site
    </a>
  </nav>

  <div class="sidebar-bottom">
    <div class="admin-user-pill">
      <div class="admin-avatar" sec:authentication="name"
           th:text="${#strings.substring(#authentication.name,0,1).toUpperCase()}">A</div>
      <div>
        <div class="admin-name" sec:authentication="name"
             th:text="${#authentication.name}">Admin</div>
        <div class="admin-role">Administrator</div>
      </div>
    </div>
    <div class="sidebar-actions">
      <button onclick="toggleAdminDark()" class="sidebar-action-btn" id="adminDarkBtn">
        🌙 Theme
      </button>
      <form th:action="@{/logout}" method="post" style="flex:1;">
        <button type="submit" class="sidebar-action-btn danger" style="width:100%;">
          ↩ Logout
        </button>
      </form>
    </div>
  </div>

</aside>

<!-- ══════════════════════════════
     MAIN
══════════════════════════════ -->
<div class="admin-main">
  <div class="admin-shimmer"></div>

  <div class="admin-topbar">
    <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
    <div class="topbar-title" th:text="${pageTitle} ?: 'Dashboard'">Dashboard</div>
    <div class="topbar-breadcrumb">
      GoReserve / <span th:text="${pageTitle} ?: 'Dashboard'">Dashboard</span>
    </div>
    <button onclick="toggleAdminDark()" class="topbar-dark-btn" title="Toggle dark mode">
      <span id="topbarDarkIcon">🌙</span>
    </button>
  </div>

  <div class="admin-content">
    <div th:replace="${body} :: content"></div>
  </div>
</div>

<script>
  /* Sidebar mobile */
  function openSidebar() {
    document.getElementById('adminSidebar').classList.add('open');
    document.getElementById('sidebarOverlay').style.display = 'block';
  }
  function closeSidebar() {
    document.getElementById('adminSidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').style.display = 'none';
  }

  /* Dark mode for admin panel */
  function toggleAdminDark() {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('adminTheme', isDark ? 'dark' : 'light');
    syncAdminDarkUI();
  }
  function syncAdminDarkUI() {
    const isDark = document.documentElement.classList.contains('dark');
    const icon = document.getElementById('topbarDarkIcon');
    if (icon) icon.textContent = isDark ? '☀️' : '🌙';
  }
  syncAdminDarkUI();
</script>
</body>
</html>
